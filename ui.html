<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: var(--figma-color-bg, #fff);
        --fg: var(--figma-color-text, #1e1e1e);
        --muted: var(--figma-color-text-secondary, #6b6b6b);
        --border: var(--figma-color-border, #e6e6e6);
        --accent: var(--figma-color-bg-brand, #0d99ff);
        --accent-fg: var(--figma-color-text-onbrand, #fff);
        --surface: var(--figma-color-bg-secondary, #f5f5f5);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 12px/1.45 "Inter", -apple-system, system-ui, sans-serif;
        color: var(--fg);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      header h1 { font-size: 13px; margin: 0; font-weight: 600; }
      #status { color: var(--muted); font-size: 11px; }
      #toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        font-size: 11px;
      }
      #toolbar label { font-weight: 500; }
      #toolbar input {
        width: 56px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        color: var(--fg);
      }
      #toolbar .unit { color: var(--muted); }
      #toolbar .hint {
        color: var(--muted);
        margin-left: auto;
        text-align: right;
        font-size: 10px;
        max-width: 190px;
      }
      main { flex: 1; overflow-y: auto; padding: 12px 14px; }
      .section-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 0 0 6px;
      }
      .thumbs-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }
      .thumbs-head .section-label { margin-bottom: 6px; }
      .sel-tools { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--muted); }
      .link {
        background: none;
        border: none;
        padding: 0;
        color: var(--accent);
        cursor: pointer;
        font: inherit;
        font-size: 10px;
      }
      .link:hover { text-decoration: underline; background: none; }
      #thumbs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }
      #thumbs:empty { display: none; }
      .thumb {
        position: relative;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px;
        background: var(--surface);
        max-width: 120px;
        cursor: pointer;
        opacity: 0.45;
        transition: opacity 0.1s, border-color 0.1s;
      }
      .thumb.selected {
        opacity: 1;
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .thumb .check {
        position: absolute;
        top: 6px;
        left: 6px;
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        line-height: 1;
        color: var(--accent-fg);
      }
      .thumb.selected .check { background: var(--accent); border-color: transparent; }
      .thumb .check::after { content: ""; }
      .thumb.selected .check::after { content: "✓"; }
      .thumb img { display: block; max-width: 110px; max-height: 90px; border-radius: 3px; }
      .thumb span {
        display: block;
        font-size: 10px;
        color: var(--muted);
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 110px;
      }
      pre {
        margin: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        font: 11px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 320px;
        overflow: auto;
      }
      footer {
        border-top: 1px solid var(--border);
        padding: 10px 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      button {
        font: inherit;
        font-weight: 500;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        cursor: pointer;
      }
      button:hover { background: var(--surface); }
      button.primary { background: var(--accent); color: var(--accent-fg); border-color: transparent; grid-column: 1 / -1; }
      button:disabled { opacity: 0.45; cursor: default; }
      .empty { color: var(--muted); text-align: center; padding: 40px 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>LLM Export</h1>
      <span id="status">…</span>
    </header>
    <div id="toolbar">
      <label for="minDim">Min crop size</label>
      <input id="minDim" type="number" min="0" step="1" value="24" />
      <span class="unit">px</span>
      <span class="hint">elements smaller than this aren't cropped on their own</span>
    </div>
    <main>
      <div id="empty" class="empty">Select one or more layers, then hit <b>Refresh</b>.</div>
      <div id="content" hidden>
        <div class="thumbs-head">
          <span class="section-label">Cropped PNGs — pick which to include</span>
          <span class="sel-tools">
            <span id="selCount"></span>
            <button class="link" id="selAll" type="button">All</button>
            <button class="link" id="selNone" type="button">None</button>
          </span>
        </div>
        <div id="thumbs"></div>
        <p class="section-label">Payload</p>
        <pre id="json"></pre>
      </div>
    </main>
    <footer>
      <button id="refresh">↻ Refresh selection</button>
      <button id="copy" disabled>Copy payload</button>
      <button id="dlJson" disabled>Download JSON</button>
      <button id="dlPng" disabled>Download PNG(s)</button>
      <button id="dlBundle" class="primary" disabled>Download LLM bundle (JSON + base64 PNG)</button>
    </footer>

    <script>
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      const emptyEl = $("empty");
      const contentEl = $("content");
      const thumbsEl = $("thumbs");
      const jsonEl = $("json");
      const minDimEl = $("minDim");

      const minDim = () => Math.max(0, parseInt(minDimEl.value, 10) || 0);

      // Latest export. `selected` holds the indices the user kept checked; the
      // footer actions build their payload from that subset only.
      let meta = null;      // { file, page, selectionCount, truncated }
      let nodes = [];       // serialized node tree
      let variables = [];   // referenced variable definitions
      let rawImages = [];   // [{ id, name, type, scale, bytes:Uint8Array }]
      let allImages = [];   // rawImages + { mimeType, base64 }
      let selected = new Set();

      const chosen = () => allImages.filter((_, i) => selected.has(i));
      const chosenRaw = () => rawImages.filter((_, i) => selected.has(i));

      function buildPayload() {
        return {
          source: "figma",
          exportedAt: new Date().toISOString(),
          file: meta.file,
          page: meta.page,
          selectionCount: meta.selectionCount,
          nodes,
          variables,
          images: chosen(),
        };
      }

      const post = (type, extra) => parent.postMessage({ pluginMessage: { type, ...extra } }, "*");

      function bytesToBase64(bytes) {
        let bin = "";
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
        }
        return btoa(bin);
      }

      function download(filename, blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function slug(s) {
        return (s || "figma").replace(/[^a-z0-9-_]+/gi, "-").replace(/^-+|-+$/g, "").toLowerCase() || "figma";
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
        }
      }

      function setEnabled(on) {
        for (const id of ["copy", "dlJson", "dlPng", "dlBundle"]) $(id).disabled = !on;
      }

      onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "settings") {
          // Saved threshold restored from clientStorage.
          if (typeof msg.minDim === "number") minDimEl.value = msg.minDim;
          return;
        }

        if (msg.type === "empty") {
          meta = null;
          variables = [];
          rawImages = [];
          allImages = [];
          selected = new Set();
          contentEl.hidden = true;
          emptyEl.hidden = false;
          statusEl.textContent = "nothing selected";
          setEnabled(false);
          return;
        }

        if (msg.type === "working") {
          statusEl.textContent = "rendering " + msg.count + " layer(s)…";
          return;
        }

        if (msg.type === "hint") {
          // Light live feedback only; data is rebuilt on Refresh.
          if (!meta) statusEl.textContent = msg.count ? msg.count + " selected — Refresh" : "nothing selected";
          return;
        }

        if (msg.type === "data") {
          emptyEl.hidden = true;
          contentEl.hidden = false;

          meta = msg.meta;
          nodes = msg.nodes;
          variables = msg.variables || [];
          rawImages = msg.images || [];
          allImages = rawImages.map((img) => ({
            id: img.id,
            name: img.name,
            type: img.type,
            mimeType: "image/png",
            scale: img.scale,
            base64: bytesToBase64(img.bytes),
          }));
          selected = new Set(allImages.map((_, i) => i)); // all on by default

          renderThumbs();
          refreshView();
          setEnabled(true);
        }
      };

      function renderThumbs() {
        thumbsEl.innerHTML = "";
        rawImages.forEach((img, i) => {
          const blob = new Blob([img.bytes], { type: "image/png" });
          const url = URL.createObjectURL(blob);
          const wrap = document.createElement("div");
          wrap.className = "thumb" + (selected.has(i) ? " selected" : "");
          wrap.title = img.name + " · " + img.type + " — click to include/exclude";
          const check = document.createElement("div");
          check.className = "check";
          const el = document.createElement("img");
          el.src = url;
          const cap = document.createElement("span");
          cap.textContent = img.name;
          wrap.appendChild(check);
          wrap.appendChild(el);
          wrap.appendChild(cap);
          wrap.onclick = () => {
            if (selected.has(i)) selected.delete(i);
            else selected.add(i);
            wrap.classList.toggle("selected", selected.has(i));
            refreshView();
          };
          thumbsEl.appendChild(wrap);
        });
      }

      // Refresh count, JSON preview, and status from current selection.
      function refreshView() {
        $("selCount").textContent = selected.size + " / " + allImages.length;
        const preview = {
          ...buildPayload(),
          images: chosen().map((i) => ({ ...i, base64: "<" + i.base64.length + " base64 chars>" })),
        };
        jsonEl.textContent = JSON.stringify(preview, null, 2);
        statusEl.textContent =
          meta.selectionCount + " selected · " + selected.size + "/" + allImages.length + " crop(s) · " +
          variables.length + " var(s)" +
          (meta.truncated ? " (capped)" : "");
      }

      function selectAll(on) {
        selected = on ? new Set(allImages.map((_, i) => i)) : new Set();
        renderThumbs();
        refreshView();
      }

      // --- footer actions ---
      $("refresh").onclick = () => post("rerun", { minDim: minDim() });

      // Changing the threshold re-exports immediately with the new value
      // (also persisted sandbox-side).
      minDimEl.onchange = () => post("rerun", { minDim: minDim() });

      $("selAll").onclick = () => selectAll(true);
      $("selNone").onclick = () => selectAll(false);

      $("copy").onclick = async () => {
        if (!meta) return;
        await copyText(JSON.stringify(buildPayload(), null, 2));
        post("notify", { text: "Payload copied (" + selected.size + " crop(s))" });
      };

      $("dlJson").onclick = () => {
        if (!meta) return;
        const p = buildPayload();
        const nodesOnly = { ...p, images: p.images.map(({ base64, ...rest }) => rest) };
        download(slug(p.file) + "-nodes.json", new Blob([JSON.stringify(nodesOnly, null, 2)], { type: "application/json" }));
      };

      $("dlPng").onclick = () => {
        chosenRaw().forEach((img, i) => {
          // Index-prefix: sibling elements often share a name — avoids clobbering.
          const fname = String(i + 1).padStart(2, "0") + "-" + slug(img.name) + "@" + img.scale + "x.png";
          download(fname, new Blob([img.bytes], { type: "image/png" }));
        });
      };

      $("dlBundle").onclick = () => {
        if (!meta) return;
        const p = buildPayload();
        download(slug(p.file) + "-llm-bundle.json", new Blob([JSON.stringify(p, null, 2)], { type: "application/json" }));
      };
    </script>
  </body>
</html>
